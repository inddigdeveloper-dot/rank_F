<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RankAutoCheck</title>
  <script>
    // GitHub Pages SPA redirect: encodes the path into the query string so the
    // main index.html can decode it and let Next.js client-side routing take over.
    var pathSegmentsToKeep = 1; // keep the /rank_F segment
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
